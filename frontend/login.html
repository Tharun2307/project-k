<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Sportex</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Custom animations & transitions -->
    <link rel="stylesheet" href="/css/styles.css">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="h-full bg-mesh-dark text-slate-100 flex flex-col font-sans justify-center items-center p-4">

    <!-- Back to Public Site link -->
    <a href="/index.html" class="absolute top-6 left-6 flex items-center gap-1.5 text-xs text-slate-400 hover:text-emerald-400 font-semibold transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Public Portal
    </a>

    <!-- Theme Toggle Button -->
    <div class="absolute top-6 right-6 flex items-center gap-3">
        <button id="theme-toggle" class="p-2 text-slate-400 hover:text-slate-200 hover:bg-slate-900 border border-slate-900 hover:border-slate-800 rounded-xl transition-all" title="Toggle Light/Dark Mode">
            <i data-lucide="sun" id="theme-icon" class="w-4 h-4"></i>
        </button>
    </div>

    <!-- Login Card Container -->
    <div class="w-full max-w-md p-8 rounded-3xl glass-panel border border-slate-900 shadow-2xl relative overflow-hidden">
        <!-- Accent Glow -->
        <div class="absolute -top-24 -left-24 w-48 h-48 rounded-full bg-emerald-500/10 blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 rounded-full bg-blue-500/10 blur-3xl pointer-events-none"></div>

        <div class="flex flex-col items-center mb-8 relative">
            <div class="w-12 h-12 rounded-2xl bg-emerald-600 flex items-center justify-center shadow-lg shadow-emerald-900/30 mb-4">
                <i data-lucide="activity" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-xl font-extrabold text-white tracking-tight">Access Sportex</h1>
            <p class="text-slate-400 text-xs mt-1">Enter your credentials to manage live scoring</p>
        </div>

        <form id="login-form" class="space-y-5 relative">
            <div>
                <label for="email" class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5">Email Address</label>
                <div class="relative">
                    <input type="email" id="email" required placeholder="name@domain.com"
                           class="w-full pl-10 pr-4 py-3 bg-slate-900/50 border border-slate-800 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/30 rounded-xl text-slate-200 text-xs placeholder-slate-500 outline-none transition-all">
                    <i data-lucide="mail" class="absolute left-3.5 top-3.5 w-4.5 h-4.5 text-slate-500"></i>
                </div>
            </div>

            <div>
                <label for="password" class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5">Password</label>
                <div class="relative">
                    <input type="password" id="password" required placeholder="••••••••"
                           class="w-full pl-10 pr-4 py-3 bg-slate-900/50 border border-slate-800 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/30 rounded-xl text-slate-200 text-xs placeholder-slate-500 outline-none transition-all">
                    <i data-lucide="lock" class="absolute left-3.5 top-3.5 w-4.5 h-4.5 text-slate-500"></i>
                </div>
            </div>

            <button type="submit" id="submit-btn" 
                    class="w-full py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-500 text-xs font-bold transition-all shadow-lg shadow-emerald-950/20 flex items-center justify-center gap-2">
                <span id="btn-text">Sign In</span>
                <div id="btn-spinner" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </form>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Login Controller Module -->
    <script type="module">
        import { login } from '/js/auth.js';
        import { showToast, initLucideIcons } from '/js/utils.js';

        // Theme initialization
        const theme = localStorage.getItem('theme') || 'dark';
        const themeIcon = document.getElementById('theme-icon');
        if (theme === 'light') {
            document.body.classList.add('light-theme');
            if (themeIcon) themeIcon.setAttribute('data-lucide', 'moon');
        } else {
            document.body.classList.remove('light-theme');
            if (themeIcon) themeIcon.setAttribute('data-lucide', 'sun');
        }

        initLucideIcons();

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            const themeIcon = document.getElementById('theme-icon');
            if (newTheme === 'light') {
                document.body.classList.add('light-theme');
                if (themeIcon) themeIcon.setAttribute('data-lucide', 'moon');
            } else {
                document.body.classList.remove('light-theme');
                if (themeIcon) themeIcon.setAttribute('data-lucide', 'sun');
            }
            initLucideIcons();
        });

        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Disable form and show spinner
            submitBtn.disabled = true;
            btnText.textContent = 'Authenticating...';
            btnSpinner.classList.remove('hidden');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const user = await login(email, password);
                
                // Success path
                setTimeout(() => {
                    if (user.role === 'EVENT_COORDINATOR') {
                        window.location.href = '/admin.html';
                    } else if (user.role === 'SPORT_ADMIN') {
                        window.location.href = '/scoring.html';
                    } else {
                        window.location.href = '/index.html';
                    }
                }, 1000);

            } catch (err) {
                // Re-enable form
                submitBtn.disabled = false;
                btnText.textContent = 'Sign In';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
