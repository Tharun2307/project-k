<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Coordinator Panel — Sportex</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Custom animations & transitions -->
    <link rel="stylesheet" href="/css/styles.css">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="h-full bg-mesh-dark text-slate-100 flex flex-col font-sans">

    <!-- Global Layout Wrapper -->
    <div class="flex h-full overflow-hidden">
        <!-- Sidebar Navigation -->
        <aside class="w-64 bg-slate-950 border-r border-slate-900 flex-shrink-0 flex flex-col justify-between">
            <div>
                <!-- Brand logo -->
                <div class="h-16 flex items-center gap-3 px-6 border-b border-slate-900">
                    <div class="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center shadow-lg shadow-emerald-900/30">
                        <i data-lucide="activity" class="w-4.5 h-4.5 text-white"></i>
                    </div>
                    <span class="font-extrabold text-sm text-white tracking-wide">Sportex Admin</span>
                </div>

                <!-- Nav list -->
                <nav class="p-4 space-y-1.5 font-semibold text-xs text-slate-400">
                    <button data-panel="dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-slate-900 text-emerald-400 border border-slate-800 transition-colors">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
                    </button>
                    <button data-panel="sports" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-900 hover:text-slate-200 transition-colors">
                        <i data-lucide="dribbble" class="w-4 h-4"></i> Sports
                    </button>
                    <button data-panel="teams" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-900 hover:text-slate-200 transition-colors">
                        <i data-lucide="users" class="w-4 h-4"></i> Teams
                    </button>
                    <button data-panel="players" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-900 hover:text-slate-200 transition-colors">
                        <i data-lucide="user-check" class="w-4 h-4"></i> Players
                    </button>
                    <button data-panel="matches" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-900 hover:text-slate-200 transition-colors">
                        <i data-lucide="calendar" class="w-4 h-4"></i> Matches
                    </button>
                    <button data-panel="admins" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-900 hover:text-slate-200 transition-colors">
                        <i data-lucide="shield-check" class="w-4 h-4"></i> Sport Admins
                    </button>
                </nav>
            </div>

            <!-- Profile Info / Logout -->
            <div class="p-4 border-t border-slate-900 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center font-bold text-xs text-emerald-400" id="profile-initials">
                        AD
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-slate-200" id="profile-name">Coordinator</span>
                        <span class="text-[8px] text-slate-500 font-medium">SUPER ADMIN</span>
                    </div>
                </div>
                <button id="logout-btn" class="p-2 text-rose-500 hover:bg-rose-500/10 rounded-lg transition-all" title="Logout">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </aside>

        <!-- Main Workspace Area -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Navbar -->
            <header class="h-16 border-b border-slate-900 bg-slate-950/60 flex items-center justify-between px-8">
                <h2 class="text-sm font-bold text-slate-200" id="page-title">Dashboard</h2>
                <div class="flex items-center gap-3">
                    <button id="theme-toggle" class="p-2 text-slate-400 hover:text-slate-200 hover:bg-slate-900 border border-slate-900 hover:border-slate-800 rounded-xl transition-all" title="Toggle Light/Dark Mode">
                        <i data-lucide="sun" id="theme-icon" class="w-4 h-4"></i>
                    </button>
                    <a href="/index.html" class="px-3.5 py-1.5 bg-slate-900 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 text-slate-300 rounded-lg text-xs font-semibold flex items-center gap-1.5 transition-colors">
                        <i data-lucide="external-link" class="w-3.5 h-3.5"></i> Public Portal
                    </a>
                </div>
            </header>

            <!-- Dashboard Scroll Container -->
            <div class="flex-1 overflow-y-auto p-8" id="workspace-container">
                <!-- Dynamically populated panel -->
            </div>
        </main>
    </div>

    <!-- CRUD overlays/Modals injected dynamically -->
    <div id="modal-container" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <!-- Inside populated by helper functions -->
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Coordinator Business logic -->
    <script type="module">
        import { guardPage, logout, getUserProfile } from '/js/auth.js';
        import { fetchWithAuth } from '/js/api.js';
        import { showToast, initLucideIcons, formatDate, formatTime } from '/js/utils.js';

        // Guard this page
        if (guardPage(['EVENT_COORDINATOR'])) {
            const profile = getUserProfile();
            document.getElementById('profile-name').textContent = profile.name;
            document.getElementById('profile-initials').textContent = profile.name.slice(0, 2).toUpperCase();

            // Set default view
            switchPanel('dashboard');

            // Wire Panel selectors
            document.querySelectorAll('[data-panel]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Update active button state
                    document.querySelectorAll('[data-panel]').forEach(b => {
                        b.classList.remove('bg-slate-900', 'text-emerald-400', 'border', 'border-slate-800');
                        b.classList.add('hover:bg-slate-900', 'hover:text-slate-200');
                    });
                    e.currentTarget.classList.add('bg-slate-900', 'text-emerald-400', 'border', 'border-slate-800');
                    e.currentTarget.classList.remove('hover:bg-slate-900', 'hover:text-slate-200');

                    const target = e.currentTarget.getAttribute('data-panel');
                    switchPanel(target);
                });
            });

            // Wire logout click
            document.getElementById('logout-btn').addEventListener('click', logout);

            // Theme initialization
            const theme = localStorage.getItem('theme') || 'dark';
            const themeIcon = document.getElementById('theme-icon');
            if (theme === 'light') {
                document.body.classList.add('light-theme');
                if (themeIcon) themeIcon.setAttribute('data-lucide', 'moon');
            } else {
                document.body.classList.remove('light-theme');
                if (themeIcon) themeIcon.setAttribute('data-lucide', 'sun');
            }
            initLucideIcons();

            document.getElementById('theme-toggle').addEventListener('click', () => {
                const currentTheme = localStorage.getItem('theme') || 'dark';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                const themeIcon = document.getElementById('theme-icon');
                if (newTheme === 'light') {
                    document.body.classList.add('light-theme');
                    if (themeIcon) themeIcon.setAttribute('data-lucide', 'moon');
                } else {
                    document.body.classList.remove('light-theme');
                    if (themeIcon) themeIcon.setAttribute('data-lucide', 'sun');
                }
                initLucideIcons();
            });
        }

        // Global states cached to reduce API rounds
        let globalSports = [];
        let globalTeams = [];
        let globalPlayers = [];
        let globalMatches = [];

        async function switchPanel(panelName) {
            const workspace = document.getElementById('workspace-container');
            const pageTitle = document.getElementById('page-title');
            
            workspace.innerHTML = `
                <div class="flex justify-center items-center py-20">
                    <div class="w-8 h-8 border-3 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            `;

            try {
                if (panelName === 'dashboard') {
                    pageTitle.textContent = 'Dashboard Overview';
                    
                    // Fetch counts
                    const [sports, teams, players, matches] = await Promise.all([
                        fetchWithAuth('/api/sports'),
                        fetchWithAuth('/api/teams'),
                        fetchWithAuth('/api/players'),
                        fetchWithAuth('/api/matches')
                    ]);
                    
                    workspace.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8 fade-in">
                            <div class="p-6 rounded-2xl glass-panel border border-slate-900 flex items-center justify-between">
                                <div>
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1">Total Sports</span>
                                    <span class="text-2xl font-extrabold text-white">${sports.length}</span>
                                </div>
                                <div class="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 border border-emerald-500/20">
                                    <i data-lucide="dribbble" class="w-5 h-5"></i>
                                </div>
                            </div>
                            <div class="p-6 rounded-2xl glass-panel border border-slate-900 flex items-center justify-between">
                                <div>
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1">Registered Teams</span>
                                    <span class="text-2xl font-extrabold text-white">${teams.length}</span>
                                </div>
                                <div class="w-10 h-10 rounded-xl bg-sky-500/10 flex items-center justify-center text-sky-400 border border-sky-500/20">
                                    <i data-lucide="users" class="w-5 h-5"></i>
                                </div>
                            </div>
                            <div class="p-6 rounded-2xl glass-panel border border-slate-900 flex items-center justify-between">
                                <div>
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1">Total Players</span>
                                    <span class="text-2xl font-extrabold text-white">${players.length}</span>
                                </div>
                                <div class="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center text-amber-400 border border-amber-500/20">
                                    <i data-lucide="user-check" class="w-5 h-5"></i>
                                </div>
                            </div>
                            <div class="p-6 rounded-2xl glass-panel border border-slate-900 flex items-center justify-between">
                                <div>
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1">Scheduled Matches</span>
                                    <span class="text-2xl font-extrabold text-white">${matches.length}</span>
                                </div>
                                <div class="w-10 h-10 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 border border-indigo-500/20">
                                    <i data-lucide="calendar" class="w-5 h-5"></i>
                                </div>
                            </div>
                        </div>

                        <div class="p-6 rounded-2xl glass-panel border border-slate-900 fade-in">
                            <h3 class="text-sm font-semibold text-slate-200 mb-4 flex items-center gap-2">
                                <i data-lucide="activity" class="w-4.5 h-4.5 text-emerald-400"></i> Event Coordinator Instructions
                            </h3>
                            <p class="text-xs text-slate-400 leading-relaxed mb-3">
                                Welcome to the Sportex Coordination Panel. As an Event Coordinator, you possess permissions to define core game rules, manage teams, bulk-import players, assign roles, schedule new fixtures, and delete records as needed.
                            </p>
                            <div class="text-[10px] text-slate-500 font-bold bg-slate-950/40 p-4 rounded-xl border border-slate-900">
                                👉 STEP 1: Add a Sport category (e.g. Cricket, Volleyball).<br>
                                👉 STEP 2: Create competing Teams linked to those sports.<br>
                                👉 STEP 3: Assign Players to their corresponding teams.<br>
                                👉 STEP 4: Spawn Sport Admin accounts to delegate game scoring roles.
                            </div>
                        </div>
                    `;
                } 
                else if (panelName === 'sports') {
                    pageTitle.textContent = 'Manage Sports Categories';
                    globalSports = await fetchWithAuth('/api/sports');
                    
                    workspace.innerHTML = `
                        <div class="flex justify-between items-center mb-6 fade-in">
                            <span class="text-xs text-slate-400 font-semibold">${globalSports.length} Categories Registered</span>
                            <button id="add-sport-btn" class="px-4 py-2 bg-emerald-600 text-white rounded-xl hover:bg-emerald-500 text-xs font-bold transition-all shadow-md shadow-emerald-950/20 flex items-center gap-1.5">
                                <i data-lucide="plus" class="w-4 h-4"></i> Add Category
                            </button>
                        </div>
                        
                        <div class="glass-panel border border-slate-900 rounded-2xl overflow-hidden fade-in">
                            <table class="w-full text-left text-xs border-collapse">
                                <thead>
                                    <tr class="bg-slate-950/60 border-b border-slate-900 text-slate-500 font-bold">
                                        <th class="p-4">ID</th>
                                        <th class="p-4">Sport Name</th>
                                        <th class="p-4">Description</th>
                                        <th class="p-4 text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="text-slate-300 divide-y divide-slate-900">
                                    ${globalSports.map(s => `
                                        <tr class="hover:bg-slate-900/10">
                                            <td class="p-4 text-slate-500 font-semibold">${s.id}</td>
                                            <td class="p-4 font-bold text-slate-200">${s.sportName}</td>
                                            <td class="p-4 text-slate-400 max-w-xs truncate">${s.description || 'N/A'}</td>
                                            <td class="p-4 flex gap-2 justify-center">
                                                <button data-edit-sport="${s.id}" class="p-1.5 text-emerald-400 hover:bg-emerald-500/10 rounded-lg transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                                <button data-delete-sport="${s.id}" class="p-1.5 text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;

                    // Wire action buttons
                    document.getElementById('add-sport-btn').addEventListener('click', () => openSportModal());
                    document.querySelectorAll('[data-edit-sport]').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const id = e.currentTarget.getAttribute('data-edit-sport');
                            const sportObj = globalSports.find(s => s.id == id);
                            openSportModal(sportObj);
                        });
                    });
                    document.querySelectorAll('[data-delete-sport]').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = e.currentTarget.getAttribute('data-delete-sport');
                            if (confirm('Are you sure you want to delete this sport?')) {
                                await fetchWithAuth(`/admin/sports/${id}`, { method: 'DELETE' });
                                showToast('Sport category deleted', 'success');
                                switchPanel('sports');
                            }
                        });
                    });
                } 
                else if (panelName === 'teams') {
                    pageTitle.textContent = 'Manage Teams';
                    const [sports, teams] = await Promise.all([
                        fetchWithAuth('/api/sports'),
                        fetchWithAuth('/api/teams')
                    ]);
                    globalSports = sports;
                    globalTeams = teams;

                    workspace.innerHTML = `
                        <div class="flex justify-between items-center mb-6 fade-in">
                            <span class="text-xs text-slate-400 font-semibold">${globalTeams.length} Teams Registered</span>
                            <button id="add-team-btn" class="px-4 py-2 bg-emerald-600 text-white rounded-xl hover:bg-emerald-500 text-xs font-bold transition-all shadow-md shadow-emerald-950/20 flex items-center gap-1.5">
                                <i data-lucide="plus" class="w-4 h-4"></i> Register Team
                            </button>
                        </div>

                        <div class="glass-panel border border-slate-900 rounded-2xl overflow-hidden fade-in">
                            <table class="w-full text-left text-xs border-collapse">
                                <thead>
                                    <tr class="bg-slate-950/60 border-b border-slate-900 text-slate-500 font-bold">
                                        <th class="p-4">ID</th>
                                        <th class="p-4">Team Name</th>
                                        <th class="p-4">Short Name</th>
                                        <th class="p-4">Sport Linked</th>
                                        <th class="p-4 text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="text-slate-300 divide-y divide-slate-900">
                                    ${globalTeams.map(t => `
                                        <tr class="hover:bg-slate-900/10">
                                            <td class="p-4 text-slate-500 font-semibold">${t.id}</td>
                                            <td class="p-4 font-bold text-slate-200">${t.teamName}</td>
                                            <td class="p-4 text-slate-400 font-semibold uppercase tracking-wider">${t.shortName || t.teamName.substring(0,3).toUpperCase()}</td>
                                            <td class="p-4"><span class="px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">${t.sport ? t.sport.sportName : 'None'}</span></td>
                                            <td class="p-4 flex gap-2 justify-center">
                                                <button data-edit-team="${t.id}" class="p-1.5 text-emerald-400 hover:bg-emerald-500/10 rounded-lg transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                                <button data-delete-team="${t.id}" class="p-1.5 text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;

                    document.getElementById('add-team-btn').addEventListener('click', () => openTeamModal());
                    document.querySelectorAll('[data-edit-team]').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const id = e.currentTarget.getAttribute('data-edit-team');
                            const teamObj = globalTeams.find(t => t.id == id);
                            openTeamModal(teamObj);
                        });
                    });
                    document.querySelectorAll('[data-delete-team]').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = e.currentTarget.getAttribute('data-delete-team');
                            if (confirm('Are you sure you want to delete this team?')) {
                                await fetchWithAuth(`/admin/teams/${id}`, { method: 'DELETE' });
                                showToast('Team deleted', 'success');
                                switchPanel('teams');
                            }
                        });
                    });
                } 
                else if (panelName === 'players') {
                    pageTitle.textContent = 'Manage Squad Players';
                    const [players, teams] = await Promise.all([
                        fetchWithAuth('/api/players'),
                        fetchWithAuth('/api/teams')
                    ]);
                    globalPlayers = players;
                    globalTeams = teams;

                    workspace.innerHTML = `
                        <div class="flex justify-between items-center mb-6 fade-in">
                            <span class="text-xs text-slate-400 font-semibold">${globalPlayers.length} Players Registered</span>
                            <div class="flex gap-2">
                                <button id="bulk-player-btn" class="px-4 py-2 bg-slate-900 border border-slate-800 text-slate-300 rounded-xl hover:border-slate-700 text-xs font-bold transition-all flex items-center gap-1.5">
                                    <i data-lucide="layers" class="w-4 h-4"></i> Bulk Import
                                </button>
                                <button id="add-player-btn" class="px-4 py-2 bg-emerald-600 text-white rounded-xl hover:bg-emerald-500 text-xs font-bold transition-all shadow-md shadow-emerald-950/20 flex items-center gap-1.5">
                                    <i data-lucide="plus" class="w-4 h-4"></i> Add Player
                                </button>
                            </div>
                        </div>

                        <div class="glass-panel border border-slate-900 rounded-2xl overflow-hidden fade-in">
                            <table class="w-full text-left text-xs border-collapse">
                                <thead>
                                    <tr class="bg-slate-950/60 border-b border-slate-900 text-slate-500 font-bold">
                                        <th class="p-4">ID</th>
                                        <th class="p-4">Player Name</th>
                                        <th class="p-4">Age</th>
                                        <th class="p-4">Position / Role</th>
                                        <th class="p-4">Team</th>
                                        <th class="p-4 text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="text-slate-300 divide-y divide-slate-900">
                                    ${globalPlayers.map(p => `
                                        <tr class="hover:bg-slate-900/10">
                                            <td class="p-4 text-slate-500 font-semibold">${p.id}</td>
                                            <td class="p-4 font-bold text-slate-200">${p.playerName}</td>
                                            <td class="p-4 text-slate-400">${p.age || 'N/A'}</td>
                                            <td class="p-4 text-slate-400 capitalize">${p.position || 'N/A'}</td>
                                            <td class="p-4"><span class="px-2 py-0.5 rounded bg-slate-900 border border-slate-800 text-slate-300">${p.team ? p.team.teamName : 'Free Agent'}</span></td>
                                            <td class="p-4 flex gap-2 justify-center">
                                                <button data-edit-player="${p.id}" class="p-1.5 text-emerald-400 hover:bg-emerald-500/10 rounded-lg transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                                <button data-delete-player="${p.id}" class="p-1.5 text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;

                    document.getElementById('add-player-btn').addEventListener('click', () => openPlayerModal());
                    document.getElementById('bulk-player-btn').addEventListener('click', () => openBulkPlayerModal());
                    document.querySelectorAll('[data-edit-player]').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const id = e.currentTarget.getAttribute('data-edit-player');
                            const playerObj = globalPlayers.find(p => p.id == id);
                            openPlayerModal(playerObj);
                        });
                    });
                    document.querySelectorAll('[data-delete-player]').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = e.currentTarget.getAttribute('data-delete-player');
                            if (confirm('Are you sure you want to delete this player?')) {
                                await fetchWithAuth(`/admin/players/${id}`, { method: 'DELETE' });
                                showToast('Player removed from database', 'success');
                                switchPanel('players');
                            }
                        });
                    });
                }
                else if (panelName === 'matches') {
                    pageTitle.textContent = 'Manage Fixtures / Matches';
                    const [matches, sports, teams] = await Promise.all([
                        fetchWithAuth('/api/matches'),
                        fetchWithAuth('/api/sports'),
                        fetchWithAuth('/api/teams')
                    ]);
                    globalMatches = matches;
                    globalSports = sports;
                    globalTeams = teams;

                    workspace.innerHTML = `
                        <div class="flex justify-between items-center mb-6 fade-in">
                            <span class="text-xs text-slate-400 font-semibold">${globalMatches.length} Fixtures Loaded</span>
                            <button id="add-match-btn" class="px-4 py-2 bg-emerald-600 text-white rounded-xl hover:bg-emerald-500 text-xs font-bold transition-all shadow-md shadow-emerald-950/20 flex items-center gap-1.5">
                                <i data-lucide="plus" class="w-4 h-4"></i> Create Match
                            </button>
                        </div>

                        <div class="glass-panel border border-slate-900 rounded-2xl overflow-hidden fade-in">
                            <table class="w-full text-left text-xs border-collapse">
                                <thead>
                                    <tr class="bg-slate-950/60 border-b border-slate-900 text-slate-500 font-bold">
                                        <th class="p-4">ID</th>

                            <textarea id="bulkJson" required 
                                      placeholder='[\n  { "playerName": "Rohit Sharma", "age": 36, "position": "Batsman" },\n  { "playerName": "Hardik Pandya", "age": 30, "position": "All Rounder" }\n]'
                                      class="w-full px-3 py-2 bg-slate-900/50 border border-slate-800 focus:border-emerald-500 rounded-xl text-slate-200 font-mono text-[10px] placeholder-slate-600 h-48 outline-none"></textarea>

                    showToast('Fixture configuration modified', 'success');
                } else {
                    await fetchWithAuth('/admin/matches', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    showToast('Match scheduled. Empty score database generated.', 'success');
                }
                hideModal();
                switchPanel('matches');
            });
        }

        // 6. Sport Admin User Modal
        function openAdminModal() {
            showModal(`
                <div class="w-full max-w-md p-6 rounded-2xl glass-panel border border-slate-900 shadow-2xl relative fade-in">
                    <h3 class="text-sm font-bold text-slate-100 mb-5">Register Sport Admin (Umpire)</h3>
                    <form id="admin-form" class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">User Full Name</label>
                            <input type="text" id="adminName" required placeholder="e.g. John Doe"
                                   class="w-full px-3 py-2 bg-slate-900/50 border border-slate-800 focus:border-emerald-500 rounded-xl text-slate-200 text-xs placeholder-slate-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
                            <input type="email" id="adminEmail" required placeholder="umpire@domain.com"
                                   class="w-full px-3 py-2 bg-slate-900/50 border border-slate-800 focus:border-emerald-500 rounded-xl text-slate-200 text-xs placeholder-slate-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Password</label>
                            <input type="password" id="adminPassword" required placeholder="••••••••"
                                   class="w-full px-3 py-2 bg-slate-900/50 border border-slate-800 focus:border-emerald-500 rounded-xl text-slate-200 text-xs placeholder-slate-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Assign Controlled Sports</label>
                            <div class="p-3 bg-slate-900/40 border border-slate-900 rounded-xl flex flex-col gap-2 max-h-32 overflow-y-auto">
                                ${globalSports.map(s => `
                                    <label class="flex items-center gap-2 cursor-pointer select-none">
                                        <input type="checkbox" name="adminSportCheck" value="${s.id}" class="rounded text-emerald-600 focus:ring-emerald-500/30">
                                        <span class="text-xs text-slate-300 font-medium">${s.sportName}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                        <div class="flex gap-2 justify-end pt-3 text-xs font-bold">
                            <button type="button" data-close-modal class="px-4 py-2 bg-slate-900 text-slate-400 hover:text-slate-200 rounded-xl">Cancel</button>
                            <button type="submit" class="px-4 py-2 bg-emerald-600 text-white rounded-xl hover:bg-emerald-500 shadow-md shadow-emerald-950/20">Register</button>
                        </div>
                    </form>
                </div>
            `);

            document.getElementById('admin-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Fetch checkboxes
                const checks = document.querySelectorAll('input[name="adminSportCheck"]:checked');
                const sportIds = Array.from(checks).map(cb => Number(cb.value));

                const payload = {
                    name: document.getElementById('adminName').value.trim(),
                    email: document.getElementById('adminEmail').value.trim(),
                    password: document.getElementById('adminPassword').value,
                    sportIds
                };

                await fetchWithAuth('/auth/admin/create-sport-admin', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                showToast('Sport Admin registered and assigned', 'success');
                hideModal();
                switchPanel('admins');
            });
        }
    </script>
</body>
</html>
